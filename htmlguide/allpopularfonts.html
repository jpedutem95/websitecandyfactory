1. Simple CSS underline
<h1 class="logo">CandyFactory</h1>
.logo {
    font-family: 'Pacifico', cursive;
    text-align: center;
}

.logo::after {
    content: "";
    display: block;
    width: 180px;
    height: 4px;
    background: black;
    margin: 10px auto 0;
    border-radius: 20px;
}

<h1 class="logo">CandyFactory</h1>

</svg>

The underlines in that image are mostly custom curved strokes. You can recreate them using CSS ::after.

--------------------------------------------------------
1. Alex Brush
<h1 class="alex">CandyFactory</h1>
.alex {
    font-family: 'Alex Brush', cursive;
    font-size: 80px;
    position: relative;
    display: inline-block;
}

.alex::after {
    content: "";
    position: absolute;
    left: 10%;
    bottom: -10px;
    width: 80%;
    height: 8px;
    border-bottom: 4px solid #000;
    border-radius: 50%;
    transform: rotate(-4deg);
}
--------------------------------------------------------
2. Dancing Script
<h1 class="dancing">CandyFactory</h1>
.dancing {
    font-family: 'Dancing Script', cursive;
    font-size: 80px;
    position: relative;
    display: inline-block;
}

.dancing::after {
    content: "";
    position: absolute;
    left: 15%;
    bottom: -8px;
    width: 70%;
    border-bottom: 3px solid #000;
    border-radius: 50%;
}

----------------------------------------------------
3. Kaushan Script
<h1 class="kaushan">CandyFactory</h1>
.kaushan {
    font-family: 'Kaushan Script', cursive;
    font-size: 80px;
    position: relative;
    display: inline-block;
}

.kaushan::after {
    content: "";
    position: absolute;
    left: 20%;
    bottom: -12px;
    width: 60%;
    height: 6px;
    background: #000;
    transform: skewX(-25deg);
}
--------------------------------------------------
4. Yellowtail
<h1 class="yellowtail">CandyFactory</h1>
.yellowtail {
    font-family: 'Yellowtail', cursive;
    font-size: 80px;
    position: relative;
    display: inline-block;
}

.yellowtail::after {
    content: "";
    position: absolute;
    left: 5%;
    bottom: -8px;
    width: 90%;
    border-bottom: 4px solid #000;
    transform: rotate(-8deg);
}

<div class="logo">

    <svg width="250" height="40" viewBox="0 0 250 40">
        <path d="M10 25 Q125 5 240 25"
              stroke="black"
              stroke-width="4"
              fill="none"
              stroke-linecap="round"/>
    </svg>
</div>
